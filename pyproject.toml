[project]
    name = 'qram'
    version = '0.0'
    dependencies = [
        'jinja2',
        'meiga',
        'pyjwt',
        'pyyaml',
        'requests',
        'schema',
        'tornado',
    ]

[project.scripts]
    qram = 'qram.__main__:_main'

[project.optional-dependencies]
    dev = [
        'mypy',
        'pytest',
        'pytest-bdd',
        'pytest-cov',
        'pytest-mock',
        'ruff',
        'types-requests',
        'types-PyYAML',
    ]

[tool.mypy]
    strict = true

[tool.ruff]
    line-length = 100
