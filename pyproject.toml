[project]
    name = 'qram'
    version = '0.0'
    dependencies = [
        'jinja2',
        'meiga',
        'pydantic',
        'pyjwt[crypto]',
        'pyyaml',
        'requests',
        'tornado',
    ]

[project.scripts]
    qram = 'qram.__main__:_main'

[project.optional-dependencies]
    dev = [
        'python-dotenv',
        'mypy',
        'pytest',
        'pytest-bdd',
        'pytest-cov',
        'pytest-dotenv',
        'pytest-mock',
        'ruff',
        'types-requests',
        'types-PyYAML',
    ]

[tool.mypy]
    strict = true

[tool.pytest.ini_options]
    markers = [
        'sysA: tests only "standalone" API interaction, without webhook substitution',
        'sysB: uses API to re-register webhook URL in provider app to local server'
    ]

[tool.ruff]
    line-length = 100
